# hermes-router configuration
#
# - Providers are auto-discovered from the config below. Tokens are NEVER stored
#   here — they're read from the environment at runtime (see "env_key" per
#   provider). A provider with no key set is silently skipped.
# - tier is the capability tier used by the classifier: cheap | standard | pro.
# - cost_class groups providers into "free" and "paid" pools, so the user can
#   always pick which pool to route through. It can also be set per-model.
#
#   • cost_class: free  -> $0/token (subscription / prepaid / free tier)
#   • cost_class: paid  -> billed per token (USD per 1M)
#   If a model omits cost_class, it inherits from the provider-level default.
#
# - prices are USD per 1,000,000 tokens (input / output). 0 = effectively free.

providers:

  # ──────────────────────────────────────────────────────────────────────────
  # FREE pool (subscription / prepaid / free tier)
  # ──────────────────────────────────────────────────────────────────────────

  zai:
    env_key: GLM_API_KEY
    base_url: https://api.z.ai/api/coding/paas/v4
    cost_class: free   # Coding Plan subscription (prepaid)
    models:
      - {name: glm-4.5-air,    tier: cheap}
      - {name: glm-4.5,        tier: standard}
      - {name: glm-4.5v,       tier: standard, vision: true}
      - {name: glm-4.6,        tier: standard}
      - {name: glm-4.6v,       tier: standard, vision: true}
      - {name: glm-5-turbo,    tier: standard}
      - {name: glm-5,          tier: pro}
      - {name: glm-5.1,        tier: pro}
      - {name: glm-5.2,        tier: pro}

  kilo:
    env_key: KILOCODE_API_KEY
    base_url: https://api.kilo.ai/api/gateway
    cost_class: free   # Monthly prepaid subscription
    models:
      - {name: tencent/hy3,         tier: pro}
      - {name: deepseek-v4-pro,     tier: pro}

  minimax:
    env_key: MINIMAX_API_KEY
    base_url: https://api.minimax.io/v1
    cost_class: free   # Prepaid through 2027-06-10
    models:
      - {name: MiniMax-M2.5-highspeed, tier: standard}
      - {name: MiniMax-M2.7,           tier: standard}
      - {name: MiniMax-M2.7-highspeed, tier: standard}
      - {name: MiniMax-M3,             tier: pro}

  github_models:
    env_key: GITHUB_TOKEN
    base_url: https://models.inference.ai.azure.com
    cost_class: free   # Free tier for personal GitHub accounts
    models:
      - {name: gpt-4o-mini,        tier: standard}
      - {name: gpt-4o,             tier: pro}
      - {name: phi-3.5-mini-instruct, tier: cheap}

  gemini:
    env_key: GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    cost_class: free   # Free tier (rate-limited)
    models:
      - {name: gemini-2.5-flash,        tier: standard}
      - {name: gemini-2.5-flash-lite,   tier: cheap}
      - {name: gemini-2.0-flash,        tier: standard}

  openrouter_free:
    env_key: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    cost_class: free
    models:
      - {name: meta-llama/llama-3.3-70b-instruct:free,  tier: pro}
      - {name: google/gemini-2.0-flash-exp:free,        tier: standard}
      - {name: qwen/qwen-2.5-72b-instruct:free,          tier: standard}

  # ──────────────────────────────────────────────────────────────────────────
  # PAID pool (billed per token)
  # ──────────────────────────────────────────────────────────────────────────

  deepseek:
    env_key: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    cost_class: paid
    models:
      - {name: deepseek-chat,      tier: standard, input_price: 0.27,  output_price: 1.10}
      - {name: deepseek-reasoner,  tier: pro,      input_price: 0.55,  output_price: 2.19}

  openrouter:
    env_key: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    cost_class: paid
    models:
      - {name: deepseek/deepseek-chat-v3-0324,  tier: standard, input_price: 0.28, output_price: 1.12}
      - {name: google/gemini-2.0-flash-001,     tier: cheap,    input_price: 0.10, output_price: 0.40}
      - {name: meta-llama/llama-3.1-8b-instruct, tier: cheap,  input_price: 0.04, output_price: 0.04}
      - {name: anthropic/claude-3.5-sonnet,     tier: pro,      vision: true,
                                              input_price: 3.00, output_price: 15.00}
      - {name: google/gemma-3-12b-it,           tier: cheap,    vision: true,
                                              input_price: 0.05, output_price: 0.15}

  xai:
    env_key: XAI_API_KEY
    base_url: https://api.x.ai/v1
    cost_class: paid
    models:
      - {name: grok-2-mini, tier: standard, input_price: 0.20, output_price: 0.80}
      - {name: grok-2,      tier: pro,      input_price: 2.00, output_price: 10.00}

  nvidia:
    env_key: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    cost_class: paid
    models:
      - {name: meta/llama-3.1-8b-instruct,  tier: cheap,    input_price: 0.04, output_price: 0.04}
      - {name: meta/llama-3.1-70b-instruct, tier: standard, input_price: 0.35, output_price: 0.40}

  venice:
    env_key: VENICE_API_KEY
    base_url: https://api.venice.ai/api/v1
    cost_class: paid
    models:
      - {name: openai-gpt-oss-120b,            tier: cheap,    input_price: 0.07, output_price: 0.30}
      - {name: mistral-small-3-2-24b-instruct, tier: cheap,    input_price: 0.09, output_price: 0.25}
      - {name: deepseek-v4-flash,              tier: cheap,    input_price: 0.14, output_price: 0.28}
      - {name: qwen3-235b-a22b-instruct-2507,  tier: cheap,    input_price: 0.15, output_price: 0.75}
      - {name: zai-org-glm-5,                  tier: pro,      input_price: 1.00, output_price: 3.20}

# Routing policy
policy:
  allow_tier_upgrade: true
  allow_fallback: true
  max_output_tokens: 1024
  monthly_budget_per_provider: 0   # 0 = unlimited
  parallel_timeout: 15             # seconds for parallel candidate batch

  # Per-provider fallback chains.

  # Model filters: blocklist and preferlist.
  # Blocked models are never selected (even if cheapest).
  # Preferred models are boosted above their price rank (but free still beats paid).
  model_filters:
    block:
      - name: "zai/glm-4.5-air"        # too slow
    prefer: []
      # - name: "zai/glm-5.2"          # uncomment to boost this model
  # When a provider from the price-ranked plan fails, the router looks up
  # the failing provider here and tries its chain before the broader sweep.
  # Key = provider name, value = ordered list of {provider, model} fallbacks.
  # Backward-compat: the old 'zai_fallback_chain' is merged into this map.
  fallback_chains:
    zai:
      - {provider: kilo,   model: tencent/hy3}
      - {provider: github_models, model: gpt-4o-mini}
      - {provider: deepseek, model: deepseek-chat}
      - {provider: venice,  model: deepseek-v4-flash}
    deepseek:
      - {provider: openrouter, model: meta-llama/llama-3.1-8b-instruct}
      - {provider: venice,     model: deepseek-v4-flash}
